<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312e81"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Upward trend line (advertising growth) -->
  <polyline points="5,23 11,19 16,21 22,12" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
  <!-- Paper plane (pilot) launching from trend — bold, reads at small size -->
  <polygon points="26,6 14,14 18,16 16,20 26,6" fill="white"/>
  <line x1="14" y1="14" x2="18" y2="16" stroke="white" stroke-width="0.3" opacity="0"/>
</svg>
